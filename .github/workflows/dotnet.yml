name: Test backend

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches:
      - main
      - releases/*
    paths-ignore:
      - '**.md'
      - 'applications/rpg_table_helper/**'

jobs:
  build:
    name: Build & Test Solution
    permissions:
      actions: none
      attestations: none
      checks: none
      contents: read
      deployments: none
      id-token: none
      issues: none
      discussions: none
      packages: none
      pages: none
      pull-requests: none
      repository-projects: read
      security-events: none
      statuses: none
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        persist-credentials: false
        submodules: recursive
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore -c Release
    - name: Test
      run: dotnet test --no-build --verbosity normal -c Release --collect:"XPlat Code Coverage" --results-directory cobertura
    - name: Report Generation
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
        reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:"." -reporttypes:"cobertura"
    - name: COVERAGE_VALUE Calculation
      run: |
        python3 - <<'PY'
        import xml.etree.ElementTree as ET
        tree = ET.parse("Cobertura.xml")
        root = tree.getroot()
        line_rate = float(root.attrib.get("line-rate", "0"))
        print("TOTAL_COVERAGE:")
        print(f"{line_rate * 100:.2f}")
        PY
